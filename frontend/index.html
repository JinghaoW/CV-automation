<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV-automation Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .file-input-label:hover {
            background: #5568d3;
        }

        .file-name {
            color: #666;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .progress-section {
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            color: #666;
            font-size: 14px;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        select, input[type="text"], input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .jobs-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .job-card {
            border-left: 4px solid #667eea;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .job-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transform: translateX(4px);
        }

        .job-score {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-right: 10px;
        }

        .job-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .job-company {
            color: #666;
            font-size: 14px;
        }

        .job-meta {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .job-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .job-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .job-actions button:hover {
            background: #f5f5f5;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 4px;
            border-left: 3px solid #ddd;
            font-size: 14px;
        }

        .history-item.completed {
            border-left-color: #4caf50;
        }

        .history-item.failed {
            border-left-color: #f44336;
        }

        .timestamp {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        .error {
            color: #f44336;
            padding: 12px;
            background: #ffebee;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            color: #4caf50;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 CV-automation Dashboard</h1>
            <p class="subtitle">Automate your job search with AI-powered scoring</p>
        </header>

        <div class="main-grid">
            <!-- Sidebar -->
            <div>
                <!-- Upload Section -->
                <div class="card">
                    <h2>📁 Upload CV</h2>
                    <div class="upload-section">
                        <div class="file-input-wrapper">
                            <input type="file" id="cvFile" accept=".pdf" />
                            <label for="cvFile" class="file-input-label">Choose CV (PDF)</label>
                        </div>
                        <span id="fileName" class="file-name"></span>
                        <div class="action-buttons">
                            <button class="btn-primary" onclick="uploadCV()">Upload</button>
                            <button class="btn-secondary" onclick="startPipeline()">Search</button>
                        </div>
                        <div id="uploadError" class="error"></div>
                        <div id="uploadSuccess" class="success"></div>
                    </div>
                </div>

                <!-- History Section -->
                <div class="card history-section">
                    <h2>📜 Recent Searches</h2>
                    <div id="historyList" class="history-list">
                        <div class="history-item">Loading history...</div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div>
                <!-- Progress Section -->
                <div id="progressSection" class="card progress-section">
                    <h2>⚙️ Pipeline Running</h2>
                    <div class="status-message">
                        <span id="currentStep">Initializing...</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #999;">
                        <span id="progressPercent">0</span>% complete · <span id="elapsedTime">0</span>s elapsed
                    </div>
                </div>

                <!-- Results Section -->
                <div id="resultsSection" class="card results-section">
                    <h2>📊 Job Results</h2>

                    <!-- Stats -->
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="totalJobsCount">0</div>
                            <div class="stat-label">Total Jobs</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="avgScoreValue">0</div>
                            <div class="stat-label">Avg Score</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="topScoreValue">0</div>
                            <div class="stat-label">Top Score</div>
                        </div>
                    </div>

                    <!-- Filters -->
                    <div class="filters">
                        <div class="filter-group">
                            <label class="filter-label">Min Score</label>
                            <input type="number" id="minScore" min="1" max="10" value="1" />
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Max Score</label>
                            <input type="number" id="maxScore" min="1" max="10" value="10" />
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Country</label>
                            <select id="countryFilter">
                                <option value="">All Countries</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Type</label>
                            <select id="typeFilter">
                                <option value="">All Types</option>
                                <option value="research">Research</option>
                                <option value="industry">Industry</option>
                            </select>
                        </div>
                    </div>

                    <!-- Jobs List -->
                    <div id="jobsList" class="jobs-list">
                        <div class="empty-state">
                            <p>No jobs found. Run a search to get started.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentSessionId = null;
        let currentResults = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupFileInput();
            loadHistory();
            setupFilterListeners();
        });

        function setupFileInput() {
            const fileInput = document.getElementById('cvFile');
            fileInput.addEventListener('change', (e) => {
                const fileName = e.target.files[0]?.name || '';
                document.getElementById('fileName').textContent = fileName ? `Selected: ${fileName}` : '';
            });
        }

        function setupFilterListeners() {
            ['minScore', 'maxScore', 'countryFilter', 'typeFilter'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if (currentResults) {
                        renderJobs();
                    }
                });
            });
        }

        async function uploadCV() {
            const fileInput = document.getElementById('cvFile');
            const file = fileInput.files[0];

            if (!file) {
                showError('uploadError', 'Please select a CV file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('auto_parse', true);

            try {
                showMessage('uploadError', '');
                const response = await fetch(`${API_BASE}/upload/cv`, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const data = await response.json();
                showMessage('uploadSuccess', 'CV uploaded successfully!');

                // Clear file input
                fileInput.value = '';
                document.getElementById('fileName').textContent = '';

                setTimeout(() => {
                    showMessage('uploadSuccess', '');
                }, 3000);
            } catch (error) {
                showError('uploadError', `Upload failed: ${error.message}`);
            }
        }

        async function startPipeline() {
            try {
                showMessage('uploadError', '');

                // Show progress section
                document.getElementById('progressSection').classList.add('active');
                document.getElementById('resultsSection').classList.remove('active');

                const response = await fetch(`${API_BASE}/pipeline/run`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        use_existing_cv: true,
                        country_filter: '',
                        skip_email: true,
                    }),
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const data = await response.json();
                currentSessionId = data.session_id;

                // Poll for status
                pollPipelineStatus();

                // Load history
                setTimeout(loadHistory, 2000);
            } catch (error) {
                showError('uploadError', `Pipeline start failed: ${error.message}`);
            }
        }

        async function pollPipelineStatus() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`${API_BASE}/pipeline/status/${currentSessionId}`);

                if (!response.ok) {
                    throw new Error('Failed to fetch status');
                }

                const data = await response.json();

                // Update progress
                document.getElementById('currentStep').textContent = data.step_name;
                document.getElementById('progressFill').style.width = data.progress_percent + '%';
                document.getElementById('progressPercent').textContent = data.progress_percent;
                document.getElementById('elapsedTime').textContent = Math.floor(data.elapsed_seconds);

                if (data.status === 'completed') {
                    document.getElementById('progressSection').classList.remove('active');
                    document.getElementById('resultsSection').classList.add('active');

                    // Load results
                    await loadResults();
                } else if (data.status === 'failed') {
                    showError('uploadError', `Pipeline failed: ${data.error}`);
                    document.getElementById('progressSection').classList.remove('active');
                } else {
                    // Continue polling
                    setTimeout(pollPipelineStatus, 1000);
                }
            } catch (error) {
                console.error('Polling error:', error);
                setTimeout(pollPipelineStatus, 2000);
            }
        }

        async function loadResults() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`${API_BASE}/jobs/${currentSessionId}`);

                if (!response.ok) {
                    throw new Error('Failed to load results');
                }

                const data = await response.json();
                currentResults = data;

                // Populate country filter
                const countries = new Set();
                data.jobs.forEach(job => {
                    if (job.country) countries.add(job.country);
                });

                const countrySelect = document.getElementById('countryFilter');
                const currentValue = countrySelect.value;
                countrySelect.innerHTML = '<option value="">All Countries</option>';
                Array.from(countries).sort().forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    countrySelect.appendChild(option);
                });
                countrySelect.value = currentValue;

                // Update stats
                updateStats();
                renderJobs();
            } catch (error) {
                console.error('Load results error:', error);
            }
        }

        function updateStats() {
            if (!currentResults) return;

            const jobs = currentResults.jobs;
            const scores = jobs.map(j => j.score).filter(s => s > 0);

            document.getElementById('totalJobsCount').textContent = jobs.length;
            document.getElementById('topScoreValue').textContent = Math.max(...scores, 0);
            document.getElementById('avgScoreValue').textContent =
                scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '0';
        }

        function renderJobs() {
            if (!currentResults) return;

            const minScore = parseInt(document.getElementById('minScore').value) || 1;
            const maxScore = parseInt(document.getElementById('maxScore').value) || 10;
            const country = document.getElementById('countryFilter').value;
            const type = document.getElementById('typeFilter').value;

            let filtered = currentResults.jobs.filter(job => {
                if (job.score < minScore || job.score > maxScore) return false;
                if (country && job.country !== country) return false;
                if (type && job.classification !== type) return false;
                return true;
            });

            const jobsList = document.getElementById('jobsList');

            if (filtered.length === 0) {
                jobsList.innerHTML = '<div class="empty-state"><p>No jobs match your filters.</p></div>';
                return;
            }

            jobsList.innerHTML = filtered.map((job, index) => `
                <div class="job-card">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                        <span class="job-score">${job.score}/10</span>
                        <span style="font-size: 12px; color: #999;">${job.classification}</span>
                    </div>
                    <div class="job-title">${escapeHtml(job.title)}</div>
                    <div class="job-company">${escapeHtml(job.company)}</div>
                    <div class="job-meta">
                        <span class="meta-item">📍 ${escapeHtml(job.country)}</span>
                        <span class="meta-item">🏢 ${escapeHtml(job.source)}</span>
                    </div>
                    <div class="job-actions">
                        <button onclick="openJobUrl('${escapeHtml(job.url)}')">View Job</button>
                        <button onclick="recordAction('${index}', 'apply')">Apply</button>
                        <button onclick="recordAction('${index}', 'dismiss')">Dismiss</button>
                    </div>
                </div>
            `).join('');
        }

        async function recordAction(index, action) {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`${API_BASE}/jobs/${currentSessionId}/${index}/action?action=${action}`, {
                    method: 'POST',
                });

                if (response.ok) {
                    // Reload results to update UI
                    await loadResults();
                }
            } catch (error) {
                console.error('Record action error:', error);
            }
        }

        function openJobUrl(url) {
            if (url) {
                window.open(url, '_blank');
                recordAction(currentResults.jobs.findIndex(j => j.url === url), 'view');
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history/?limit=10`);

                if (!response.ok) return;

                const data = await response.json();
                const historyList = document.getElementById('historyList');

                if (data.records.length === 0) {
                    historyList.innerHTML = '<div class="history-item">No search history yet</div>';
                    return;
                }

                historyList.innerHTML = data.records.map(record => `
                    <div class="history-item ${record.completed_at ? 'completed' : ''}">
                        <strong>${escapeHtml(record.profile_name)}</strong>
                        <br>${record.job_count} jobs • Top: ${record.top_score}/10
                        <div class="timestamp">${new Date(record.searched_at).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Load history error:', error);
            }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (message) {
                element.textContent = message;
                element.classList.add('show');
            } else {
                element.classList.remove('show');
            }
        }

        function showMessage(elementId, message) {
            const element = document.getElementById(elementId);
            if (message) {
                element.textContent = message;
                element.classList.add('show');
            } else {
                element.classList.remove('show');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
